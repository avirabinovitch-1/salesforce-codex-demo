name: Deploy Salesforce Demo

on:
  workflow_dispatch:
    inputs:
      deploy_confirmation:
        description: Type DEPLOY to confirm manual deployment to the demo org.
        required: true
        type: string

permissions:
  contents: read

env:
  SF_SOURCE_DIR: force-app
  SF_TARGET_ORG: demo

jobs:
  deploy:
    name: Deploy Salesforce metadata
    runs-on: ubuntu-latest

    steps:
      - name: Confirm manual deployment intent
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_CONFIRMATION" != "DEPLOY" ]]; then
            echo "Type DEPLOY in the workflow input to run this deployment." >&2
            exit 1
          fi
        env:
          DEPLOY_CONFIRMATION: ${{ inputs.deploy_confirmation }}

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Show Salesforce CLI version
        run: sf --version

      - name: Authenticate to Salesforce
        shell: bash
        run: |
          set -euo pipefail
          : "${SF_AUTH_URL_B64:?SF_AUTH_URL_B64 secret is required}"
          printf '%s' "$SF_AUTH_URL_B64" | base64 --decode > sf-auth-url.txt

          if ! grep -q '^force://' sf-auth-url.txt; then
            echo "::error::Salesforce auth secret does not decode to a force:// auth URL."
            {
              echo "### Salesforce Auth"
              echo ""
              echo "- Secret used: \`SF_AUTH_URL_B64\`"
              echo "- Format check: failed before contacting Salesforce"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "### Salesforce Auth"
            echo ""
            echo "- Secret used: \`SF_AUTH_URL_B64\`"
            echo "- Format check: valid force URL"
          } >> "$GITHUB_STEP_SUMMARY"

          if ! sf org login sfdx-url \
            --sfdx-url-file sf-auth-url.txt \
            --alias "$SF_TARGET_ORG" > sf-auth.log 2>&1; then
            echo "::error::Salesforce auth failed."
            {
              echo ""
              echo "Salesforce CLI error:"
              echo '```'
              sed -E 's#force://[^[:space:]]+#force://[redacted]#g' sf-auth.log | tail -n 30
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            cat sf-auth.log >&2
            exit 1
          fi
        env:
          SF_AUTH_URL_B64: ${{ secrets.SF_AUTH_URL_B64 }}

      - name: Choose Salesforce test level
        id: test-level
        shell: bash
        run: |
          set -euo pipefail
          if find "$SF_SOURCE_DIR" -type f \( -name "*.cls" -o -name "*.trigger" \) -print -quit | grep -q .; then
            echo "test_level=RunLocalTests" >> "$GITHUB_OUTPUT"
            echo "Apex metadata found. Deployment will run local Apex tests." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "test_level=NoTestRun" >> "$GITHUB_OUTPUT"
            echo "No Apex classes or triggers found. Deployment will use NoTestRun." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy to demo org
        shell: bash
        run: |
          set -euo pipefail
          sf project deploy start \
            --source-dir "$SF_SOURCE_DIR" \
            --target-org "$SF_TARGET_ORG" \
            --test-level "${{ steps.test-level.outputs.test_level }}" \
            --wait 60

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy Salesforce Demo"
            echo ""
            echo "- Result: \`${{ job.status }}\`"
            echo "- Ref: \`$GITHUB_REF_NAME\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Source directory: \`$SF_SOURCE_DIR\`"
            echo "- Target org alias: \`$SF_TARGET_ORG\`"
            echo "- Test level: \`${{ steps.test-level.outputs.test_level }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove Salesforce auth file
        if: always()
        run: rm -f sf-auth-url.txt sf-auth.log
