name: Salesforce Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  SF_SOURCE_DIR: force-app
  SF_TARGET_ORG: demo
  SF_API_VERSION: "67.0"
  SF_AUTOUPDATE_DISABLE: true
  SF_DISABLE_TELEMETRY: true
  SFDX_DISABLE_TELEMETRY: true
  SF_DISABLE_DNS_CHECK: true
  SFDX_DISABLE_DNS_CHECK: true
  SF_USE_GENERIC_UNIX_KEYCHAIN: true
  USE_GENERIC_UNIX_KEYCHAIN: true

jobs:
  validate:
    name: Validate Salesforce metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Salesforce deployment libraries
        shell: bash
        run: |
          set -euo pipefail
          npm install --global @salesforce/source-deploy-retrieve @salesforce/core
          echo "NODE_PATH=$(npm root -g)" >> "$GITHUB_ENV"

      - name: Get Salesforce access token
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.sfdx" "$HOME/.sf"
          chmod 700 "$HOME/.sfdx" "$HOME/.sf"

          : "${SF_AUTH_URL_B64:?SF_AUTH_URL_B64 secret is required}"
          printf '%s' "$SF_AUTH_URL_B64" | base64 --decode > sf-auth-url.txt

          if ! grep -q '^force://' sf-auth-url.txt; then
            echo "::error::Salesforce auth secret does not decode to a force:// auth URL."
            {
              echo "### Salesforce Auth"
              echo ""
              echo "- Secret used: \`SF_AUTH_URL_B64\`"
              echo "- Format check: failed before contacting Salesforce"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "### Salesforce Auth"
            echo ""
            echo "- Secret used: \`SF_AUTH_URL_B64\`"
            echo "- Format check: valid force URL"
          } >> "$GITHUB_STEP_SUMMARY"

          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const authUrl = fs.readFileSync('sf-auth-url.txt', 'utf8').trim();
          const match = authUrl.match(/^force:\/\/([^:]*):([^:]*):([^@]*)@(.+)$/);

          if (!match) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\nSalesforce auth URL did not match the expected force:// format.\n');
            process.exit(1);
          }

          const [, clientId, clientSecret, refreshToken, rawInstance] = match;
          const host = rawInstance.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
          const instanceUrl = `https://${host}`;
          const params = new URLSearchParams({
            grant_type: 'refresh_token',
            client_id: clientId,
            refresh_token: refreshToken,
          });

          if (clientSecret) params.set('client_secret', clientSecret);

          const response = await fetch(`${instanceUrl}/services/oauth2/token`, {
            method: 'POST',
            headers: { 'content-type': 'application/x-www-form-urlencoded' },
            body: params,
          });
          const bodyText = await response.text();
          let body;

          try {
            body = JSON.parse(bodyText);
          } catch {
            body = { raw: bodyText.slice(0, 500) };
          }

          if (!response.ok || !body.access_token) {
            fs.appendFileSync(
              process.env.GITHUB_STEP_SUMMARY,
              `\nSalesforce OAuth token exchange failed:\n\n\`\`\`\n${JSON.stringify({
                status: response.status,
                error: body.error,
                error_description: body.error_description,
                raw: body.raw,
              }, null, 2)}\n\`\`\`\n`,
            );
            process.exit(1);
          }

          console.log(`::add-mask::${body.access_token}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `SF_ACCESS_TOKEN<<SF_TOKEN\n${body.access_token}\nSF_TOKEN\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `SF_INSTANCE_URL=${body.instance_url || instanceUrl}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '\n- OAuth refresh: access token issued\n');
          NODE
        env:
          SF_AUTH_URL_B64: ${{ secrets.SF_AUTH_URL_B64 }}

      - name: Choose Salesforce test level
        id: test-level
        shell: bash
        run: |
          set -euo pipefail
          if find "$SF_SOURCE_DIR" -type f \( -name "*.cls" -o -name "*.trigger" \) -print -quit | grep -q .; then
            echo "test_level=RunLocalTests" >> "$GITHUB_OUTPUT"
            echo "Apex metadata found. Validation will run local Apex tests." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "test_level=NoTestRun" >> "$GITHUB_OUTPUT"
            echo "No Apex classes or triggers found. Validation will use NoTestRun." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate deployment dry run
        shell: bash
        run: |
          set -euo pipefail
          SF_CHECK_ONLY=true \
          SF_TEST_LEVEL="${{ steps.test-level.outputs.test_level }}" \
            node .github/scripts/deploy-salesforce.cjs

      - name: Write validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Salesforce Validate"
            echo ""
            echo "- Source directory: \`$SF_SOURCE_DIR\`"
            echo "- Target org alias: \`$SF_TARGET_ORG\`"
            echo "- Test level: \`${{ steps.test-level.outputs.test_level }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove Salesforce auth file
        if: always()
        run: rm -f sf-auth-url.txt
