name: Salesforce Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  SF_SOURCE_DIR: force-app
  SF_TARGET_ORG: demo

jobs:
  validate:
    name: Validate Salesforce metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Show Salesforce CLI version
        run: sf --version

      - name: Authenticate to Salesforce
        shell: bash
        run: |
          set -euo pipefail
          : "${SF_CONSUMER_KEY:?SF_CONSUMER_KEY secret is required}"
          : "${SF_USERNAME:?SF_USERNAME secret is required}"
          : "${SF_JWT_KEY:?SF_JWT_KEY secret is required}"

          umask 077
          printf '%s\n' "$SF_JWT_KEY" > server.key

          sf org login jwt \
            --client-id "$SF_CONSUMER_KEY" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --alias "$SF_TARGET_ORG"
        env:
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Choose Salesforce test level
        id: test-level
        shell: bash
        run: |
          set -euo pipefail
          if find "$SF_SOURCE_DIR" -type f \( -name "*.cls" -o -name "*.trigger" \) -print -quit | grep -q .; then
            echo "test_level=RunLocalTests" >> "$GITHUB_OUTPUT"
            echo "Apex metadata found. Validation will run local Apex tests." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "test_level=NoTestRun" >> "$GITHUB_OUTPUT"
            echo "No Apex classes or triggers found. Validation will use NoTestRun." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate deployment dry run
        shell: bash
        run: |
          set -euo pipefail
          sf project deploy start \
            --dry-run \
            --source-dir "$SF_SOURCE_DIR" \
            --target-org "$SF_TARGET_ORG" \
            --test-level "${{ steps.test-level.outputs.test_level }}" \
            --wait 60

      - name: Write validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Salesforce Validate"
            echo ""
            echo "- Source directory: \`$SF_SOURCE_DIR\`"
            echo "- Target org alias: \`$SF_TARGET_ORG\`"
            echo "- Test level: \`${{ steps.test-level.outputs.test_level }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove JWT key file
        if: always()
        run: rm -f server.key
